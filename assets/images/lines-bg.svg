<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C3D825"/>
      <stop offset="1" stop-color="#7BA23F"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="760" fill="#F7FAE9"/>
  <!-- 流動等高線：由上而下，緩波，低透明度 -->
  <g fill="none" stroke="url(#lg)" stroke-width="1.6" opacity="0.16">
    <path d="M-60 90 C 300 30, 600 150, 900 90 S 1500 30, 1500 90"/>
    <path d="M-60 170 C 320 110, 600 230, 920 170 S 1500 110, 1500 170"/>
    <path d="M-60 250 C 280 190, 620 310, 900 250 S 1500 190, 1500 250"/>
    <path d="M-60 330 C 340 270, 640 390, 940 330 S 1500 270, 1500 330"/>
    <path d="M-60 430 C 300 370, 600 490, 900 430 S 1500 370, 1500 430"/>
    <path d="M-60 520 C 320 460, 620 580, 920 520 S 1500 460, 1500 520"/>
    <path d="M-60 610 C 280 550, 640 670, 900 610 S 1500 550, 1500 610"/>
    <path d="M-60 690 C 340 630, 600 750, 940 690 S 1500 630, 1500 690"/>
  </g>
  <!-- 同心弧（右上角），呼應中心圓的環狀設計 -->
  <g fill="none" stroke="#94B85D" stroke-width="1.4" opacity="0.18">
    <circle cx="1300" cy="120" r="80"/>
    <circle cx="1300" cy="120" r="140"/>
    <circle cx="1300" cy="120" r="210"/>
  </g>
  <!-- 點陣節點，輕量裝飾 -->
  <g fill="#7BA23F" opacity="0.22">
    <circle cx="180" cy="640" r="3.5"/>
    <circle cx="240" cy="660" r="2.5"/>
    <circle cx="300" cy="630" r="2"/>
    <circle cx="1180" cy="560" r="3"/>
    <circle cx="1240" cy="580" r="2.2"/>
  </g>
</svg>
